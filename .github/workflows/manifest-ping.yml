name: Manifest Ping

on:
  schedule:
    # Every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: health-check-write
  cancel-in-progress: false

jobs:
  manifest-ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run manifest health check
        run: python3 scripts/health_check.py --mode manifest

      - name: Commit healthy-backends.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add healthy-backends.json status-data/
          git diff --staged --quiet || git commit -m "health: manifest ping update [skip ci]"
          git push
