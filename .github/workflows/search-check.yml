name: Search Check

on:
  schedule:
    # Every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: health-check-write
  cancel-in-progress: false

jobs:
  search-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run search health check
        run: python3 scripts/health_check.py --mode search

      - name: Commit healthy-backends.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add healthy-backends.json status-data/
          git diff --staged --quiet || git commit -m "health: search check update [skip ci]"
          git push
